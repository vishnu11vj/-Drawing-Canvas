<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drawing Canvas</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  body{height:100vh;display:flex;flex-direction:column;background:#1a1a1a;font-family:'Inter',sans-serif;overflow:hidden;}
  .toolbar{display:flex;align-items:center;gap:12px;padding:10px 16px;background:#242424;border-bottom:1px solid #333;flex-wrap:wrap;}
  .tool-group{display:flex;gap:6px;align-items:center;padding-right:12px;border-right:1px solid #333;}
  .tool-group:last-child{border-right:none;}
  .tool-btn{width:36px;height:36px;border:1.5px solid #444;border-radius:8px;background:#2e2e2e;color:#ccc;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all 0.15s;}
  .tool-btn:hover{background:#3a3a3a;border-color:#666;}
  .tool-btn.active{background:#4a90e2;border-color:#4a90e2;color:#fff;}
  .size-wrap{display:flex;align-items:center;gap:8px;}
  .size-wrap input{width:80px;accent-color:#4a90e2;}
  .size-preview{width:20px;height:20px;display:flex;align-items:center;justify-content:center;}
  .colors{display:flex;gap:5px;align-items:center;}
  .color-swatch{width:24px;height:24px;border-radius:6px;cursor:pointer;border:2px solid transparent;transition:all 0.15s;}
  .color-swatch:hover,.color-swatch.active{border-color:#fff;transform:scale(1.15);}
  input[type=color]{width:32px;height:32px;border:none;border-radius:6px;cursor:pointer;padding:0;background:none;}
  .canvas-wrap{flex:1;overflow:hidden;display:flex;align-items:center;justify-content:center;background:#1a1a1a;}
  canvas{cursor:crosshair;box-shadow:0 0 0 1px #333;}
  .status{position:fixed;bottom:10px;right:16px;color:#555;font-size:12px;}
  label{color:#888;font-size:12px;}
</style>
</head>
<body>
<div class="toolbar">
  <div class="tool-group">
    <button class="tool-btn active" id="penBtn" onclick="setTool('pen')" title="Pen">✏️</button>
    <button class="tool-btn" id="eraserBtn" onclick="setTool('eraser')" title="Eraser">🧹</button>
    <button class="tool-btn" id="lineBtn" onclick="setTool('line')" title="Line">╱</button>
    <button class="tool-btn" id="rectBtn" onclick="setTool('rect')" title="Rectangle">▭</button>
    <button class="tool-btn" id="circleBtn" onclick="setTool('circle')" title="Circle">○</button>
    <button class="tool-btn" id="fillBtn" onclick="setTool('fill')" title="Fill">🪣</button>
  </div>
  <div class="tool-group size-wrap">
    <label>Size</label>
    <input type="range" id="sizeSlider" min="1" max="50" value="4" oninput="updateSize()">
    <div class="size-preview"><div id="sizePreview" style="border-radius:50%;background:#fff;width:4px;height:4px;"></div></div>
  </div>
  <div class="tool-group colors">
    <label>Color</label>
    <div class="color-swatch active" style="background:#ffffff" onclick="setColor('#ffffff',this)"></div>
    <div class="color-swatch" style="background:#ff4444" onclick="setColor('#ff4444',this)"></div>
    <div class="color-swatch" style="background:#ff9500" onclick="setColor('#ff9500',this)"></div>
    <div class="color-swatch" style="background:#ffcc00" onclick="setColor('#ffcc00',this)"></div>
    <div class="color-swatch" style="background:#00cc66" onclick="setColor('#00cc66',this)"></div>
    <div class="color-swatch" style="background:#4a90e2" onclick="setColor('#4a90e2',this)"></div>
    <div class="color-swatch" style="background:#cc44ff" onclick="setColor('#cc44ff',this)"></div>
    <div class="color-swatch" style="background:#1a1a1a" onclick="setColor('#1a1a1a',this)"></div>
    <input type="color" id="customColor" value="#ffffff" oninput="setColor(this.value,null)" title="Custom color">
  </div>
  <div class="tool-group">
    <button class="tool-btn" onclick="undo()" title="Undo">↩️</button>
    <button class="tool-btn" onclick="clearCanvas()" title="Clear">🗑️</button>
    <button class="tool-btn" onclick="save()" title="Save">💾</button>
  </div>
  <div class="tool-group">
    <label>Opacity</label>
    <input type="range" id="opacity" min="10" max="100" value="100" style="width:70px;accent-color:#4a90e2">
  </div>
</div>
<div class="canvas-wrap">
  <canvas id="canvas"></canvas>
</div>
<div class="status" id="status">0, 0</div>
<script>
  const canvas=document.getElementById('canvas');
  const ctx=canvas.getContext('2d');
  const wrap=document.querySelector('.canvas-wrap');
  let tool='pen',color='#ffffff',size=4,drawing=false,startX,startY,history=[],snapshot;

  function resize(){
    const w=wrap.clientWidth,h=wrap.clientHeight;
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    canvas.width=Math.min(w-40,1200);canvas.height=Math.min(h-20,800);
    ctx.fillStyle='#2a2a2a';ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.putImageData(img,0,0);
  }
  resize();window.addEventListener('resize',resize);

  function setTool(t){
    tool=t;
    document.querySelectorAll('.tool-btn[id$="Btn"]').forEach(b=>b.classList.remove('active'));
    document.getElementById(t+'Btn').classList.add('active');
    canvas.style.cursor=t==='eraser'?'cell':t==='fill'?'copy':'crosshair';
  }

  function setColor(c,el){
    color=c;
    document.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
    if(el)el.classList.add('active');
  }

  function updateSize(){
    size=document.getElementById('sizeSlider').value;
    const p=document.getElementById('sizePreview');
    const s=Math.min(size,20);p.style.width=s+'px';p.style.height=s+'px';
  }

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    const touch=e.touches?e.touches[0]:e;
    return{x:touch.clientX-r.left,y:touch.clientY-r.top};
  }

  function saveHistory(){history.push(ctx.getImageData(0,0,canvas.width,canvas.height));if(history.length>30)history.shift();}
  function undo(){if(history.length){ctx.putImageData(history.pop(),0,0);}}

  canvas.addEventListener('mousedown',e=>{
    drawing=true;const p=getPos(e);startX=p.x;startY=p.y;
    saveHistory();
    if(tool==='fill'){floodFill(Math.round(p.x),Math.round(p.y));drawing=false;return;}
    snapshot=ctx.getImageData(0,0,canvas.width,canvas.height);
    ctx.beginPath();ctx.moveTo(p.x,p.y);
  });

  canvas.addEventListener('mousemove',e=>{
    const p=getPos(e);
    document.getElementById('status').textContent=`${Math.round(p.x)}, ${Math.round(p.y)}`;
    if(!drawing)return;
    const op=parseInt(document.getElementById('opacity').value)/100;
    ctx.globalAlpha=op;
    if(tool==='pen'){ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';ctx.lineTo(p.x,p.y);ctx.stroke();}
    else if(tool==='eraser'){ctx.strokeStyle='#2a2a2a';ctx.lineWidth=size*2;ctx.lineCap='round';ctx.lineJoin='round';ctx.lineTo(p.x,p.y);ctx.stroke();}
    else{
      ctx.putImageData(snapshot,0,0);
      ctx.strokeStyle=color;ctx.lineWidth=size;ctx.beginPath();
      if(tool==='line'){ctx.moveTo(startX,startY);ctx.lineTo(p.x,p.y);ctx.stroke();}
      else if(tool==='rect'){ctx.strokeRect(startX,startY,p.x-startX,p.y-startY);}
      else if(tool==='circle'){const rx=(p.x-startX)/2,ry=(p.y-startY)/2;ctx.ellipse(startX+rx,startY+ry,Math.abs(rx),Math.abs(ry),0,0,Math.PI*2);ctx.stroke();}
    }
    ctx.globalAlpha=1;
  });

  canvas.addEventListener('mouseup',()=>{drawing=false;ctx.beginPath();});
  canvas.addEventListener('mouseleave',()=>{drawing=false;});

  function floodFill(x,y){
    const img=ctx.getImageData(0,0,canvas.width,canvas.height);
    const data=img.data;
    const idx=(y*canvas.width+x)*4;
    const tr=data[idx],tg=data[idx+1],tb=data[idx+2],ta=data[idx+3];
    const fc=hexToRgb(color);
    if(tr===fc.r&&tg===fc.g&&tb===fc.b)return;
    const stack=[[x,y]];
    while(stack.length){
      const[cx,cy]=stack.pop();
      const ci=(cy*canvas.width+cx)*4;
      if(cx<0||cx>=canvas.width||cy<0||cy>=canvas.height)continue;
      if(data[ci]!==tr||data[ci+1]!==tg||data[ci+2]!==tb||data[ci+3]!==ta)continue;
      data[ci]=fc.r;data[ci+1]=fc.g;data[ci+2]=fc.b;data[ci+3]=255;
      stack.push([cx+1,cy],[cx-1,cy],[cx,cy+1],[cx,cy-1]);
    }
    ctx.putImageData(img,0,0);
  }

  function hexToRgb(hex){const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return{r,g,b};}

  function clearCanvas(){saveHistory();ctx.fillStyle='#2a2a2a';ctx.fillRect(0,0,canvas.width,canvas.height);}

  function save(){
    const a=document.createElement('a');a.download='drawing.png';a.href=canvas.toDataURL();a.click();
  }
</script>
</body>
</html>
